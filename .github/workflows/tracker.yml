name: Daily prediction tracker

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily during the tournament
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Refresh match dataset
        run: |
          curl -fsSL -o data/results.csv \
            https://raw.githubusercontent.com/martj42/international_results/master/results.csv

      - name: Lock new predictions and score completed ones
        run: mvn -B -q compile exec:java -Dexec.args="--track"

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.csv predictions/predictions.csv README.md
          git diff --cached --quiet || git commit -m "Tracker: lock predictions / update results $(date -u +%F)"
          git push
