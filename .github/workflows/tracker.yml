name: Daily prediction tracker

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily during the tournament
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Refresh match dataset
        run: |
          curl -fsSL -o data/results.csv \
            https://raw.githubusercontent.com/martj42/international_results/master/results.csv

      - name: Lock new predictions and score completed ones
        run: mvn -B -q compile exec:java -Dexec.args="--track"

      - name: Append today's title odds to the trajectory history
        run: |
          python3 - <<'PY'
          import json, os
          tj = json.load(open('docs/data/tracker.json'))
          date = tj.get('updated')
          odds = {o['team']: round(o['title'], 1) for o in tj.get('titleOdds', [])}
          path = 'docs/data/odds_history.json'
          hist = json.load(open(path)) if os.path.exists(path) else []
          hist = [h for h in hist if h.get('date') != date]   # replace same-day re-runs
          hist.append({'date': date, 'odds': odds})
          hist.sort(key=lambda h: h['date'])
          open(path, 'w').write(json.dumps(hist, indent=0))
          print('trajectory history now spans', len(hist), 'day(s)')
          PY

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.csv predictions/predictions.csv README.md docs/data/tracker.json docs/data/odds_history.json
          git diff --cached --quiet || git commit -m "Tracker: lock predictions / update results $(date -u +%F)"
          git push
